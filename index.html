<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams - Wujudkan Impian Baju Mu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.6s cubic-bezier(0.4, 0, 0.2, 1);
            animation: kenBurns 22s ease infinite alternate;
        }

        .slide.active { opacity: 1; }

        @keyframes kenBurns {
            0%   { transform: scale(1.0); }
            100% { transform: scale(1.12); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,105,180,0.78), rgba(180,120,220,0.72), rgba(100,180,255,0.68));
            z-index: 2;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
    </style>
</head>
<body class="bg-pink-50 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-2xl border-b border-pink-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl drop-shadow-md">🌸</span>
                <h1 class="logo-font text-3xl font-bold bg-gradient-to-r from-pink-500 via-purple-500 to-violet-600 bg-clip-text text-transparent">MY Dreams</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-9 font-medium text-gray-700">
                <a href="#" class="hover:text-pink-600 transition-colors">Beranda</a>
                <a href="#" onclick="openAIDesign()" class="hover:text-pink-600 transition-colors">AI Design</a>
                <a href="#" onclick="openLiveChat()" class="hover:text-pink-600 transition-colors">Live Chat</a>
                <a href="#" onclick="openModelCriteria()" class="hover:text-pink-600 transition-colors">Kriteria Model</a>
                <a href="#" onclick="openFabricTypes()" class="hover:text-pink-600 transition-colors">Jenis Kain</a>
            </div>

            <div class="flex gap-4">
                <button onclick="openLogin()" class="px-7 py-3 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50 transition-all font-medium">Masuk</button>
                <button onclick="openRegister()" class="px-7 py-3 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl hover:scale-105 transition-all font-medium shadow-lg">Daftar Gratis</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero flex items-center text-white">
        <div class="slideshow" id="slideshow">
            <div class="slide active" style="background-image: url('https://picsum.photos/id/1015/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/1016/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/133/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/201/2000/1200')"></div>
        </div>

        <div class="overlay"></div>

        <div class="content max-w-5xl mx-auto px-6 text-center z-10">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-2xl px-8 py-3 rounded-3xl mb-8 text-base font-medium border border-white/30">
                🌸 Koleksi Terbaru 2026
            </div>
            <h1 class="text-5xl md:text-7xl font-bold logo-font leading-none mb-6 tracking-tighter">
                Wujudkan<br>Impian Baju Mu
            </h1>
            <p class="text-xl max-w-2xl mx-auto mb-12 text-white/90">
                Desain baju custom dengan AI canggih.<br>
                Dari pegunungan hingga pantai, dari taman hingga malam kota.
            </p>

            <button onclick="openAIDesign()" 
                    class="group px-12 py-6 bg-white text-pink-600 font-semibold rounded-3xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all flex items-center gap-4 mx-auto">
                <i class="fas fa-magic group-active:rotate-12 transition"></i>
                Mulai Desain dengan AI
            </button>
        </div>

        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex gap-4 z-20">
            <div onclick="goToSlide(0)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer active"></div>
            <div onclick="goToSlide(1)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
            <div onclick="goToSlide(2)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
            <div onclick="goToSlide(3)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
        </div>
    </section>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
        <div id="modalContent" class="modal-content rounded-3xl max-w-2xl w-full overflow-hidden"></div>
    </div>

    <script>
        // ==================== SLIDESHOW ====================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.slide-dot');

        function showSlide(index) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        function nextSlide() {
            showSlide((currentSlide + 1) % slides.length);
        }
        setInterval(nextSlide, 5800);

        function goToSlide(index) {
            showSlide(index);
        }

        // ==================== FLUX PROXY (AMAN) ====================
        async function generateWithFlux(prompt) {
            const btn = document.getElementById('generateBtn');
            if (!btn) return;

            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Generating with Flux...`;
            btn.disabled = true;

            try {
                const response = await fetch('/api/generate-flux', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const result = await response.json();

                if (!response.ok) throw new Error(result.error || 'Failed to generate');

                showFluxResult(result.imageUrl, prompt);

            } catch (err) {
                alert("❌ Gagal generate gambar: " + err.message);
                console.error(err);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        function showFluxResult(imageUrl, prompt) {
            const resultHTML = `
                <div class="p-10 text-center">
                    <h3 class="text-3xl font-semibold text-pink-600 mb-4">✨ Desain Flux Berhasil!</h3>
                    <p class="text-gray-600 mb-6">"${prompt}"</p>
                    
                    <div class="bg-white p-3 rounded-3xl shadow-xl inline-block">
                        <img src="${imageUrl}" alt="Fashion Design" class="max-w-md w-full rounded-2xl">
                    </div>

                    <div class="flex gap-4 mt-10">
                        <button onclick="closeModal()" class="flex-1 py-4 border-2 border-pink-300 text-pink-600 rounded-3xl font-medium hover:bg-pink-50">Buat Desain Baru</button>
                        <button onclick="window.open('${imageUrl}', '_blank')" class="flex-1 py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl font-medium">Download Gambar</button>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = resultHTML;
        }

        // ==================== MODAL AI DESIGN ====================
        function openAIDesign() {
            const modalHTML = `
                <div class="p-8 md:p-10">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h2 class="text-3xl font-semibold text-pink-600 logo-font">AI Design Studio</h2>
                            <p class="text-gray-500 mt-1">Ceritakan baju impianmu, AI Flux akan mewujudkannya</p>
                        </div>
                        <button onclick="closeModal()" class="text-4xl text-gray-300 hover:text-gray-500 transition">×</button>
                    </div>

                    <div class="mb-6">
                        <textarea id="promptInput" rows="5" 
                            class="w-full p-6 border border-pink-200 rounded-3xl focus:outline-none text-base"
                            placeholder="Deskripsikan baju impianmu... (contoh: baju renang one-piece motif sakura warna pastel di pantai)"></textarea>
                    </div>

                    <button onclick="generateAI()" id="generateBtn"
                        class="w-full py-6 bg-gradient-to-r from-pink-500 via-purple-500 to-violet-500 text-white rounded-3xl font-semibold text-xl flex items-center justify-center gap-3 hover:brightness-110 transition-all shadow-xl">
                        <i class="fas fa-magic"></i>
                        <span>Generate Desain dengan Flux</span>
                    </button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = modalHTML;
            document.getElementById('modal').classList.remove('hidden');
        }

        function generateAI() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) {
                alert("Silakan tulis deskripsi baju impianmu 🌸");
                return;
            }
            generateWithFlux(prompt);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Modal sederhana lainnya
        function openLiveChat() { showSimpleModal("Live Chat", "💬 Fitur ini sedang dalam pengembangan"); }
        function openModelCriteria() { showSimpleModal("Kriteria Model", "Ukuran tubuh, warna kulit, dan pose favorit akan segera tersedia."); }
        function openFabricTypes() { showSimpleModal("Jenis Kain", "Satin • Cotton • Linen • Chiffon • Silk • Denim • dan banyak lagi"); }
        function openLogin() { showSimpleModal("Masuk", "Fitur login sedang dikembangkan"); }
        function openRegister() { showSimpleModal("Daftar Gratis", "Selamat datang di MY Dreams! 🌸"); }

        function showSimpleModal(title, content) {
            const html = `
                <div class="p-10 text-center">
                    <h2 class="text-2xl font-semibold text-pink-600 mb-6">${title}</h2>
                    <p class="text-gray-600 text-lg">${content}</p>
                    <button onclick="closeModal()" class="mt-10 px-10 py-4 bg-pink-600 text-white rounded-3xl">Tutup</button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        // Inisialisasi
        window.onload = () => {
            console.log("%c🌸 MY Dreams Premium siap mewujudkan impian bajumu!", "color:#db2777; font-size:16px");
        };
    </script>
</body>
</html>
