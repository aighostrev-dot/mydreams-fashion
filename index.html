<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams - Wujudkan Impian Baju Mu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.6s cubic-bezier(0.4, 0, 0.2, 1);
            animation: kenBurns 22s ease infinite alternate;
        }

        .slide.active { opacity: 1; }

        @keyframes kenBurns {
            0%   { transform: scale(1.0); }
            100% { transform: scale(1.12); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,105,180,0.78), rgba(180,120,220,0.72), rgba(100,180,255,0.68));
            z-index: 2;
        }
    </style>
</head>
<body class="bg-pink-50 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-2xl border-b border-pink-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl drop-shadow-md">🌸</span>
                <h1 class="logo-font text-3xl font-bold bg-gradient-to-r from-pink-500 via-purple-500 to-violet-600 bg-clip-text text-transparent">MY Dreams</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-9 font-medium text-gray-700">
                <a href="#" class="hover:text-pink-600 transition-colors">Beranda</a>
                <a href="#" onclick="showComingSoon('AI Design')" class="hover:text-pink-600 transition-colors">AI Design</a>
                <a href="#" onclick="showComingSoon('Live Chat')" class="hover:text-pink-600 transition-colors">Live Chat</a>
                <a href="#" onclick="showComingSoon('Kriteria Model')" class="hover:text-pink-600 transition-colors">Kriteria Model</a>
                <a href="#" onclick="showComingSoon('Jenis Kain')" class="hover:text-pink-600 transition-colors">Jenis Kain</a>
            </div>

            <div class="flex gap-4" id="authButtons">
                <button onclick="openLogin()" 
                        class="px-7 py-3 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50 transition-all font-medium">Masuk</button>
                <button onclick="openRegister()" 
                        class="px-7 py-3 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl hover:scale-105 transition-all font-medium shadow-lg">Daftar Gratis</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero flex items-center text-white">
        <div class="slideshow" id="slideshow">
            <div class="slide active" style="background-image: url('https://picsum.photos/id/1015/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/1016/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/133/2000/1200')"></div>
            <div class="slide" style="background-image: url('https://picsum.photos/id/201/2000/1200')"></div>
        </div>

        <div class="overlay"></div>

        <div class="content max-w-5xl mx-auto px-6 text-center z-10">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-2xl px-8 py-3 rounded-3xl mb-8 text-base font-medium border border-white/30">
                🌸 Koleksi Terbaru 2026
            </div>
            <h1 class="text-5xl md:text-7xl font-bold logo-font leading-none mb-6 tracking-tighter">
                Wujudkan<br>Impian Baju Mu
            </h1>
            <p class="text-xl max-w-2xl mx-auto mb-12 text-white/90">
                Desain baju custom dengan AI canggih.<br>
                Dari pegunungan hingga pantai, dari taman hingga malam kota.
            </p>

            <button onclick="showComingSoon('AI Design')" 
                    class="group px-12 py-6 bg-white text-pink-600 font-semibold rounded-3xl text-xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all flex items-center gap-4 mx-auto">
                <i class="fas fa-magic"></i>
                Mulai Desain dengan AI
            </button>
        </div>
    </section>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
        <div id="modalContent" class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-2xl"></div>
    </div>

    <script>
        // ==================== SLIDESHOW ====================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.slide-dot');

        function showSlide(index) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }
        setInterval(() => showSlide((currentSlide + 1) % slides.length), 5800);

        // ==================== AUTH SYSTEM (Simple) ====================
        let currentUser = null;

        function openLogin() {
            const html = `
                <div class="p-8">
                    <div class="text-center mb-8">
                        <span class="text-4xl">🌸</span>
                        <h2 class="text-2xl font-semibold text-pink-600 mt-4">Selamat Datang Kembali</h2>
                    </div>
                    <div class="space-y-5">
                        <input id="loginEmail" type="email" placeholder="Email atau No. HP" 
                               class="w-full px-5 py-4 border border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 text-base">
                        <input id="loginPassword" type="password" placeholder="Kata Sandi" 
                               class="w-full px-5 py-4 border border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400 text-base">
                        
                        <button onclick="handleLogin()" 
                                class="w-full py-4 bg-pink-600 text-white rounded-3xl font-medium hover:bg-pink-700 transition text-lg">
                            Masuk
                        </button>
                        
                        <p class="text-center text-sm text-gray-500">
                            Belum punya akun? 
                            <span onclick="switchToRegister()" class="text-pink-600 cursor-pointer hover:underline font-medium">Daftar Gratis</span>
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        function openRegister() {
            const html = `
                <div class="p-8">
                    <div class="text-center mb-8">
                        <span class="text-4xl">🌸</span>
                        <h2 class="text-2xl font-semibold text-pink-600 mt-4">Buat Akun Baru</h2>
                    </div>
                    <div class="space-y-5">
                        <input id="regEmail" type="email" placeholder="Email atau No. HP" 
                               class="w-full px-5 py-4 border border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400">
                        <input id="regPassword" type="password" placeholder="Kata Sandi" 
                               class="w-full px-5 py-4 border border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400">
                        <input id="regConfirmPassword" type="password" placeholder="Konfirmasi Kata Sandi" 
                               class="w-full px-5 py-4 border border-pink-200 rounded-2xl focus:outline-none focus:border-pink-400">
                        
                        <button onclick="handleRegister()" 
                                class="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl font-medium hover:brightness-110 transition text-lg">
                            Daftar Gratis
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!email || !password) {
                alert("Email dan Password wajib diisi");
                return;
            }
            if (password !== confirmPassword) {
                alert("Konfirmasi password tidak cocok");
                return;
            }
            if (password.length < 6) {
                alert("Password minimal 6 karakter");
                return;
            }

            // Simpan ke localStorage
            localStorage.setItem('myDreamsUser', JSON.stringify({ email, password }));
            alert("🎉 Pendaftaran berhasil! Silakan login.");
            closeModal();
            setTimeout(openLogin, 500);
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const savedUser = JSON.parse(localStorage.getItem('myDreamsUser'));

            if (savedUser && savedUser.email === email && savedUser.password === password) {
                currentUser = savedUser;
                alert(`✅ Login berhasil! Selamat datang kembali, ${email}`);
                closeModal();
                updateAuthButtons();
            } else {
                alert("❌ Email atau password salah");
            }
        }

        function updateAuthButtons() {
            const authDiv = document.getElementById('authButtons');
            if (currentUser) {
                authDiv.innerHTML = `
                    <button onclick="logout()" 
                            class="px-7 py-3 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50 transition-all font-medium">
                        Keluar (${currentUser.email})
                    </button>
                `;
            }
        }

        function logout() {
            if (confirm("Yakin ingin keluar?")) {
                currentUser = null;
                localStorage.removeItem('myDreamsUser');
                document.getElementById('authButtons').innerHTML = `
                    <button onclick="openLogin()" class="px-7 py-3 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50 transition-all font-medium">Masuk</button>
                    <button onclick="openRegister()" class="px-7 py-3 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl hover:scale-105 transition-all font-medium shadow-lg">Daftar Gratis</button>
                `;
            }
        }

        function switchToRegister() {
            closeModal();
            setTimeout(openRegister, 400);
        }

        function showComingSoon(feature) {
            const html = `
                <div class="p-10 text-center">
                    <div class="text-6xl mb-6">🌸</div>
                    <h2 class="text-2xl font-semibold text-pink-600 mb-3">${feature}</h2>
                    <p class="text-gray-600">Fitur ini sedang dalam pengembangan.</p>
                    <button onclick="closeModal()" class="mt-8 px-10 py-4 bg-pink-600 text-white rounded-3xl">Mengerti</button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Inisialisasi
        window.onload = () => {
            // Cek apakah sudah login sebelumnya
            const savedUser = JSON.parse(localStorage.getItem('myDreamsUser'));
            if (savedUser) {
                currentUser = savedUser;
                updateAuthButtons();
            }
            console.log("%c🌸 MY Dreams - Login System aktif", "color:#db2777; font-size:16px");
        };
    </script>
</body>
</html>
