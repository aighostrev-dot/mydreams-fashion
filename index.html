<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams - Wujudkan Impian Baju Mu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero-bg {
            background: linear-gradient(135deg, rgba(255,182,193,0.85), rgba(216,191,216,0.85), rgba(173,216,230,0.85)),
                        url('https://picsum.photos/id/1015/2000/1200') center/cover fixed;
            animation: flowerFloat 40s ease infinite;
        }
        @keyframes flowerFloat {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .petal {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 10;
            animation: fall linear infinite;
            opacity: 0.85;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-pink-50 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-lg border-b border-pink-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🌸</span>
                <h1 class="logo-font text-3xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent">MY Dreams</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-medium">
                <a href="#" class="hover:text-pink-600 transition-colors">Beranda</a>
                <a href="#" onclick="openAIDesign()" class="hover:text-pink-600 transition-colors">AI Design</a>
                <a href="#" onclick="openLiveChat()" class="hover:text-pink-600 transition-colors">Live Chat</a>
                <a href="#" onclick="openModelCriteria()" class="hover:text-pink-600 transition-colors">Kriteria Model</a>
                <a href="#" onclick="openFabricTypes()" class="hover:text-pink-600 transition-colors">Jenis Kain</a>
            </div>

            <div class="flex gap-4">
                <button onclick="openLogin()" class="px-6 py-2.5 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50">Masuk</button>
                <button onclick="openRegister()" class="px-6 py-2.5 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl">Daftar Gratis</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="hero" class="hero-bg min-h-screen flex items-center text-white relative overflow-hidden">
        <!-- Petal Container -->
        <div id="petals" class="absolute inset-0 pointer-events-none"></div>

        <div class="max-w-5xl mx-auto px-6 text-center z-10">
            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full mb-6">
                🌸 Koleksi Terbaru 2026
            </div>
            <h1 class="text-6xl md:text-7xl font-bold logo-font leading-none mb-6">Wujudkan<br>Impian Baju Mu</h1>
            <p class="text-xl max-w-2xl mx-auto mb-10">Desain baju custom dengan AI canggih yang mencari referensi otomatis dan membantu kamu dari nol sampai jadi.</p>
            
            <button onclick="openAIDesign()" 
                    class="px-10 py-5 bg-white text-pink-600 font-semibold rounded-3xl text-lg shadow-2xl hover:scale-105 transition flex items-center gap-3 mx-auto">
                <i class="fas fa-magic"></i>
                Mulai Desain dengan AI
            </button>
        </div>
    </section>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div id="modalContent" class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden modal shadow-2xl">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="modalTitle" class="text-2xl font-semibold text-pink-600"></h2>
                    <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
                </div>
                <div id="modalBody" class="text-gray-600 leading-relaxed min-h-[120px]"></div>
            </div>
            <div class="border-t p-4 flex justify-end bg-gray-50">
                <button onclick="closeModal()" 
                        class="px-8 py-3 bg-pink-600 text-white rounded-3xl hover:bg-pink-700 transition">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <script>
        // === Animasi Petal ===
        function createPetals() {
            const container = document.getElementById('petals');
            const flowers = ['🌸', '🌺', '🌼', '🪻', '🌻'];
            
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 8 + 10) + 's';
                petal.style.fontSize = (Math.random() * 1.4 + 1.6) + 'rem';
                container.appendChild(petal);

                setTimeout(() => petal.remove(), 18000);
            }, 220);
        }

        // === Modal Functions ===
        function showModal(title, content) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Fitur-fitur
        function openAIDesign() {
            const content = `
                <p class="mb-4 text-lg font-medium">✨ AI Design Studio</p>
                <textarea id="promptInput" rows="4" class="w-full p-4 border border-pink-200 rounded-2xl focus:border-pink-400 outline-none resize-none" 
                    placeholder="Contoh: baju pesta wanita motif bunga sakura warna pastel, lengan puff, panjang midi..."></textarea>
                <button onclick="generateDesign()" 
                        class="mt-6 w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl font-medium hover:scale-105 transition">
                    Generate Desain Sekarang
                </button>
            `;
            showModal("AI Design Studio", content);
        }

        function generateDesign() {
            const prompt = document.getElementById('promptInput').value.trim() || "baju cantik motif bunga";
            closeModal();
            
            setTimeout(() => {
                showModal("Hasil AI Design", `
                    <div class="text-center">
                        <div class="text-6xl mb-4">👗</div>
                        <p class="text-pink-600 font-medium">"${prompt}"</p>
                        <p class="text-sm text-gray-500 mt-6">Desain berhasil dibuat oleh AI!</p>
                        <p class="text-xs text-gray-400 mt-2">Fitur preview gambar & edit lanjutan sedang dikembangkan.</p>
                    </div>
                `);
            }, 600);
        }

        function openLiveChat() {
            showModal("Live Chat", `<p class="text-center py-8">💬 Fitur Live Chat dengan desainer sedang dalam pengembangan.</p>`);
        }

        function openModelCriteria() {
            showModal("Kriteria Model", `
                <ul class="space-y-3 text-sm">
                    <li>✅ Ukuran XS - 5XL</li>
                    <li>✅ Bentuk tubuh (Hourglass, Pear, dll)</li>
                    <li>✅ Tinggi badan & warna kulit</li>
                    <li>✅ Pose & gaya favorit</li>
                </ul>
            `);
        }

        function openFabricTypes() {
            showModal("Jenis Kain Premium", `
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>🌸 Satin Flowy</div>
                    <div>☁️ Cotton Organic</div>
                    <div>🌿 Linen Natural</div>
                    <div>✨ Chiffon Dreamy</div>
                </div>
            `);
        }

        function openLogin() {
            showModal("Masuk ke MY Dreams", `
                <p class="mb-6 text-center">Silakan masuk ke akun kamu</p>
                <input type="text" placeholder="Email atau Nomor HP" class="w-full p-4 border rounded-2xl mb-4">
                <input type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6">
                <button onclick="closeModal()" class="w-full py-4 bg-pink-600 text-white rounded-3xl">Masuk</button>
            `);
        }

        function openRegister() {
            showModal("Daftar Akun Baru", `
                <p class="mb-6 text-center">Buat akun gratis sekarang</p>
                <input type="text" placeholder="Nama Lengkap" class="w-full p-4 border rounded-2xl mb-3">
                <input type="email" placeholder="Email" class="w-full p-4 border rounded-2xl mb-6">
                <button onclick="closeModal()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl">Daftar Sekarang</button>
            `);
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Inisialisasi
        window.onload = function() {
            createPetals();
            console.log("%c🌸 MY Dreams - Versi Cantik dengan Modal & Petal sudah aktif!", "color:#ec4899; font-size:16px");
        };
    </script>
</body>
</html>
