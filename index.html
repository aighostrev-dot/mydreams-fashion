<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero-bg {
            background: linear-gradient(135deg, #f5f0e8, #e8d9c2);
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-[#f5f0e8]">

    <!-- LANDING PAGE -->
    <div id="landingPage" class="hero-bg flex items-center justify-center min-h-screen">
        <div class="text-center px-6">
            <h1 class="logo-font text-7xl md:text-8xl font-bold tracking-tight text-[#8d6e63] mb-12">
                MY DREAMS
            </h1>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="showLoginModal()" class="px-10 py-4 border border-[#8d6e63] text-[#8d6e63] rounded-full font-medium hover:bg-white transition">Masuk</button>
                <button onclick="showRegisterModal()" class="px-10 py-4 bg-[#8d6e63] text-white rounded-full font-medium hover:bg-[#6d574e] transition">Daftar</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="hidden min-h-screen bg-[#f5f0e8]">
        <div class="flex h-screen">
            
            <!-- Sidebar Kiri (Diperkecil) -->
            <div class="w-60 bg-white border-r border-[#d4c4b0] p-5 flex flex-col">
                <div class="mb-10">
                    <h1 class="logo-font text-2xl font-bold tracking-tight text-[#8d6e63]">MY DREAMS</h1>
                </div>
                
                <div class="space-y-1 flex-1 text-sm">
                    <a href="#" onclick="showCategory('baju')" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-[#f5f0e8] font-medium">👕 Baju</a>
                    <a href="#" onclick="showCategory('celana')" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-[#f5f0e8] font-medium">👖 Celana</a>
                    <a href="#" onclick="showCategory('dress')" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-[#f5f0e8] font-medium">👗 Dress</a>
                </div>

                <button onclick="logout()" class="mt-8 w-full py-3 text-red-700 hover:bg-red-50 rounded-2xl font-medium flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>

            <!-- Konten Utama -->
            <div class="flex-1 p-6 overflow-auto">
                <div id="mainContent"></div>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200]">
        <div class="bg-white rounded-3xl p-10 max-w-sm w-full relative">
            <button onclick="closeModals()" class="absolute top-5 right-5 text-3xl text-gray-400 hover:text-gray-600">×</button>
            <div class="flex justify-center mb-8">
                <h1 class="logo-font text-4xl font-bold tracking-tight text-[#8d6e63]">MY DREAMS</h1>
            </div>
            <h2 class="text-2xl font-semibold mb-6 text-center text-[#4a3f35]">Masuk ke Akun</h2>
            <input id="username" type="text" placeholder="Username" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-4 focus:border-[#8d6e63] outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-6 focus:border-[#8d6e63] outline-none">
            <button onclick="login()" class="w-full py-4 bg-[#8d6e63] text-white rounded-3xl font-semibold hover:bg-[#6d574e]">Masuk</button>
        </div>
    </div>

    <!-- Modal Register -->
    <div id="registerModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200]">
        <div class="bg-white rounded-3xl p-10 max-w-sm w-full relative">
            <button onclick="closeModals()" class="absolute top-5 right-5 text-3xl text-gray-400 hover:text-gray-600">×</button>
            <div class="flex justify-center mb-8">
                <h1 class="logo-font text-4xl font-bold tracking-tight text-[#8d6e63]">MY DREAMS</h1>
            </div>
            <h2 class="text-2xl font-semibold mb-6 text-center text-[#4a3f35]">Daftar Akun Baru</h2>
            <input type="text" placeholder="Nama Lengkap" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-4">
            <input type="email" placeholder="Email" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-4">
            <input type="text" placeholder="Username" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-6">
            <button onclick="register()" class="w-full py-4 bg-[#8d6e63] text-white rounded-3xl font-semibold hover:bg-[#6d574e]">Daftar</button>
        </div>
    </div>

    <!-- Modal Tambah Koleksi -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[300]">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full relative">
            <button onclick="closeAddModal()" class="absolute top-4 right-4 text-3xl text-gray-400 hover:text-gray-600">×</button>
            <h2 id="addModalTitle" class="text-2xl font-semibold mb-6">Tambah Koleksi Baru</h2>
            
            <input id="itemName" type="text" placeholder="Nama item" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-4">
            <input id="itemPrice" type="text" placeholder="Harga (Rp)" class="w-full p-4 border border-[#d4c4b0] rounded-2xl mb-6">
            
            <div class="mb-6">
                <label class="block text-sm mb-2">Foto Koleksi</label>
                <input id="itemPhoto" type="file" accept="image/*" class="w-full">
                <img id="photoPreview" class="hidden mt-4 w-full h-48 object-cover rounded-2xl border">
            </div>

            <button onclick="saveNewItem()" class="w-full py-4 bg-[#8d6e63] text-white rounded-3xl font-semibold">Simpan Koleksi</button>
        </div>
    </div>

    <script>
        let currentCategory = '';
        let collections = JSON.parse(localStorage.getItem('collections')) || {
            baju: [],
            celana: [],
            dress: []
        };

        function saveCollections() {
            localStorage.setItem('collections', JSON.stringify(collections));
        }

        function showLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function showRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
        function closeModals() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('registerModal').classList.add('hidden');
        }

        function login() {
            closeModals();
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            showCategory('baju');
        }

        function register() {
            alert("🎉 Akun berhasil dibuat!");
            closeModals();
            showLoginModal();
        }

        function logout() {
            if (confirm("Keluar dari akun?")) {
                document.getElementById('dashboardPage').classList.add('hidden');
                document.getElementById('landingPage').classList.remove('hidden');
            }
        }

        function showCategory(category) {
            currentCategory = category;
            let html = `<h2 class="text-3xl font-semibold mb-6 text-[#4a3f35] capitalize">${category}</h2>`;
            html += `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">`;

            // Kotak Tambah Koleksi
            html += `
                <div onclick="openAddModal()" 
                     class="border-2 border-dashed border-[#8d6e63] rounded-3xl h-80 flex flex-col items-center justify-center cursor-pointer hover:bg-[#f5f0e8]">
                    <div class="text-6xl mb-3 text-[#8d6e63]">+</div>
                    <p class="text-[#8d6e63] font-medium">Tambah ${category} Baru</p>
                </div>`;

            // Tampilkan koleksi yang sudah ada
            collections[category].forEach((item, index) => {
                html += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm relative">
                        <img src="${item.photo || 'https://picsum.photos/id/1015/300/400'}" class="w-full h-64 object-cover">
                        <div class="p-4">
                            <h4 class="font-medium">${item.name}</h4>
                            <p class="text-[#8d6e63] font-semibold">Rp ${item.price}</p>
                        </div>
                        <button onclick="deleteItem('${category}', ${index}); event.stopImmediatePropagation();" 
                                class="absolute top-3 right-3 bg-red-500 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs">×</button>
                    </div>`;
            });

            html += `</div>`;
            document.getElementById('mainContent').innerHTML = html;
        }

        function openAddModal() {
            document.getElementById('addModalTitle').textContent = `Tambah ${currentCategory} Baru`;
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemPhoto').value = '';
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        // Preview foto
        document.getElementById('itemPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const preview = document.getElementById('photoPreview');
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        function saveNewItem() {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const photoInput = document.getElementById('itemPhoto');

            if (!name || !price) {
                alert("Nama dan harga harus diisi");
                return;
            }

            let photo = '';
            if (photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photo = e.target.result;
                    addItemToCollection(name, price, photo);
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                addItemToCollection(name, price, '');
            }
        }

        function addItemToCollection(name, price, photo) {
            collections[currentCategory].push({ name, price, photo });
            saveCollections();
            closeAddModal();
            showCategory(currentCategory);   // refresh tampilan
        }

        function deleteItem(category, index) {
            if (confirm("Hapus item ini?")) {
                collections[category].splice(index, 1);
                saveCollections();
                showCategory(category);
            }
        }

        function saveCollections() {
            localStorage.setItem('collections', JSON.stringify(collections));
        }

        window.onload = () => {
            console.log("%cMY Dreams - Kotak tambah koleksi sudah diperbaiki", "color:#8d6e63");
        };
    </script>
</body>
</html>
