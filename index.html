<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(249, 168, 212, 0.7), rgba(192, 132, 252, 0.7)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover;
        }
    </style>
</head>
<body class="bg-pink-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌸</span>
                <h1 class="text-3xl font-bold text-pink-600">MY Dreams</h1>
            </div>
            <div class="hidden md:flex gap-8">
                <a href="#" class="hover:text-pink-600">Beranda</a>
                <a href="#" onclick="alert('AI Design Studio akan dibuka')" class="hover:text-pink-600">AI Design</a>
                <a href="#" onclick="alert('Live Chat sedang dalam pengembangan')" class="hover:text-pink-600">Live Chat</a>
                <a href="#" onclick="alert('Kriteria Model')" class="hover:text-pink-600">Kriteria Model</a>
                <a href="#" onclick="alert('Jenis Kain')" class="hover:text-pink-600">Jenis Kain</a>
            </div>
            <div class="flex gap-3">
                <button onclick="alert('Login modal akan muncul')" 
                        class="px-6 py-2 border border-pink-300 rounded-full text-pink-600 hover:bg-pink-50">
                    Masuk
                </button>
                <button onclick="alert('Daftar Gratis clicked')" 
                        class="px-6 py-2 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-full">
                    Daftar Gratis
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg min-h-screen flex items-center text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <p class="text-sm uppercase tracking-widest mb-4">🌸 Koleksi Terbaru 2026</p>
            <h1 class="text-6xl font-bold leading-tight mb-6">Wujudkan<br>Impian Baju Mu</h1>
            <p class="text-xl mb-10 max-w-xl mx-auto">Desain baju custom dengan AI canggih yang mencari referensi otomatis dan membantu kamu dari nol sampai jadi.</p>
            
            <button onclick="alert('🎉 AI Design Studio dibuka! (dalam pengembangan)')" 
                    class="px-10 py-4 bg-white text-pink-600 font-semibold rounded-3xl text-lg shadow-xl hover:scale-105 transition">
                Mulai Desain dengan AI
            </button>
        </div>
    </section>

    <script>
        // Tailwind script sudah di-load via CDN
        console.log('%cMY Dreams berhasil di-load di Vercel!', 'color:#ec4899; font-size:16px');
