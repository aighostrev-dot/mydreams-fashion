<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams - Wujudkan Impian Baju Mu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero-bg {
            background: linear-gradient(135deg, rgba(255,182,193,0.85), rgba(216,191,216,0.85), rgba(173,216,230,0.85)),
                        url('https://picsum.photos/id/1015/2000/1200') center/cover fixed;
            animation: flowerFloat 40s ease infinite;
        }
        @keyframes flowerFloat {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .modal {
            animation: modalPop 0.3s ease forwards;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-pink-50">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-lg border-b border-pink-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🌸</span>
                <h1 class="logo-font text-3xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent">MY Dreams</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-medium">
                <a href="#" class="hover:text-pink-600">Beranda</a>
                <a href="#" onclick="openAIDesign()" class="hover:text-pink-600">AI Design</a>
                <a href="#" onclick="openLiveChat()" class="hover:text-pink-600">Live Chat</a>
                <a href="#" onclick="openModelCriteria()" class="hover:text-pink-600">Kriteria Model</a>
                <a href="#" onclick="openFabricTypes()" class="hover:text-pink-600">Jenis Kain</a>
            </div>

            <div class="flex gap-4">
                <button onclick="openLogin()" class="px-6 py-2.5 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50">Masuk</button>
                <button onclick="openRegister()" class="px-6 py-2.5 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl">Daftar Gratis</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg min-h-screen flex items-center text-white relative overflow-hidden">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full mb-6">
                🌸 Koleksi Terbaru 2026
            </div>
            <h1 class="text-6xl md:text-7xl font-bold logo-font leading-none mb-6">Wujudkan<br>Impian Baju Mu</h1>
            <p class="text-xl max-w-2xl mx-auto mb-10">Desain baju custom dengan AI canggih yang mencari referensi otomatis dan membantu kamu dari nol sampai jadi.</p>
            
            <button onclick="openAIDesign()" 
                    class="px-10 py-5 bg-white text-pink-600 font-semibold rounded-3xl text-lg shadow-2xl hover:scale-105 transition flex items-center gap-3 mx-auto">
                <i class="fas fa-magic"></i>
                Mulai Desain dengan AI
            </button>
        </div>
    </section>

    <!-- Modal Template -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div id="modalContent" class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden modal">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="modalTitle" class="text-2xl font-semibold text-pink-600"></h2>
                    <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
                </div>
                <div id="modalBody" class="text-gray-600 leading-relaxed"></div>
            </div>
            <div class="border-t p-4 flex justify-end">
                <button onclick="closeModal()" 
                        class="px-8 py-3 bg-pink-600 text-white rounded-3xl hover:bg-pink-700 transition">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <script>
        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function openAIDesign() {
            const content = `
                <p class="mb-4">✨ <strong>AI Design Studio</strong></p>
                <p class="mb-6">Ketik deskripsi baju impianmu, AI akan membantu mencari referensi dan menghasilkan desain.</p>
                <textarea id="aiPrompt" rows="4" class="w-full p-4 border border-pink-200 rounded-2xl focus:border-pink-400 outline-none" 
                    placeholder="Contoh: baju pesta wanita motif bunga sakura, warna pastel, lengan puff..."></textarea>
                <button onclick="generateAI()" 
                        class="mt-4 w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl font-medium">
                    Generate Desain dengan AI
                </button>
            `;
            showModal("AI Design Studio", content);
        }

        function generateAI() {
            const prompt = document.getElementById('aiPrompt').value || "baju cantik dengan motif bunga";
            closeModal();
            setTimeout(() => {
                showModal("Hasil AI Design", `
                    <p class="text-center text-xl mb-4">🎉 Desain berhasil dibuat!</p>
                    <div class="text-8xl text-center mb-4">👗</div>
                    <p class="text-center text-pink-600">"${prompt}"</p>
                    <p class="text-xs text-gray-500 text-center mt-6">Fitur lengkap (preview gambar & edit) sedang dikembangkan.</p>
                `);
            }, 400);
        }

        function openLiveChat() {
            showModal("Live Chat", `
                <p class="mb-4">💬 <strong>Chat langsung dengan desainer profesional</strong></p>
                <p class="text-sm">Fitur ini sedang dalam tahap pengembangan.<br>Kamu bisa menghubungi kami melalui WhatsApp nanti.</p>
            `);
        }

        function openModelCriteria() {
            showModal("Kriteria Model", `
                <ul class="list-disc pl-5 space-y-2">
                    <li>Ukuran: XS hingga 5XL</li>
                    <li>Bentuk tubuh (Hourglass, Pear, Rectangle, dll)</li>
                    <li>Tinggi badan & warna kulit</li>
                    <li>Pose & gaya favorit</li>
                </ul>
                <p class="mt-4 text-sm text-pink-600">Kita akan tambahkan virtual fitting di versi selanjutnya.</p>
            `);
        }

        function openFabricTypes() {
            showModal("Jenis Kain Premium", `
                <ul class="grid grid-cols-2 gap-3 text-sm">
                    <li>🌸 Satin Flowy</li>
                    <li>☁️ Cotton Organic</li>
                    <li>🌿 Linen Natural</li>
                    <li>✨ Chiffon Dreamy</li>
                </ul>
                <p class="mt-4 text-xs text-gray-500">Semua kain ramah lingkungan & impor langsung.</p>
            `);
        }

        function openLogin() {
            showModal("Masuk ke MY Dreams", `
                <p class="mb-6">Silakan masuk dengan akun kamu.</p>
                <input type="text" placeholder="Email atau Nomor HP" class="w-full p-4 border rounded-2xl mb-4">
                <input type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6">
                <button onclick="closeModal()" class="w-full py-4 bg-pink-600 text-white rounded-3xl">Masuk</button>
            `);
        }

        function openRegister() {
            showModal("Daftar Akun Baru", `
                <p class="mb-6">Buat akun gratis dan mulai desain baju impianmu.</p>
                <input type="text" placeholder="Nama Lengkap" class="w-full p-4 border rounded-2xl mb-3">
                <input type="email" placeholder="Email" class="w-full p-4 border rounded-2xl mb-6">
                <button onclick="closeModal()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl">Daftar Sekarang</button>
            `);
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
