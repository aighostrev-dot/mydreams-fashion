<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Dreams - Wujudkan Impian Baju Mu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            overflow: hidden;
        }

        .slideshow {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.4s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 105, 180, 0.75),
                rgba(180, 120, 220, 0.70),
                rgba(100, 180, 255, 0.65)
            );
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
        }

        .slide-dot {
            transition: all 0.3s ease;
        }
        .slide-dot.active {
            background-color: white;
            transform: scale(1.4);
        }
    </style>
</head>
<body class="bg-pink-50 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-lg border-b border-pink-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🌸</span>
                <h1 class="logo-font text-3xl font-bold bg-gradient-to-r from-pink-500 via-purple-500 to-violet-600 bg-clip-text text-transparent">MY Dreams</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-medium text-gray-700">
                <a href="#" class="hover:text-pink-600 transition-colors">Beranda</a>
                <a href="#" onclick="openAIDesign()" class="hover:text-pink-600 transition-colors">AI Design</a>
                <a href="#" onclick="openLiveChat()" class="hover:text-pink-600 transition-colors">Live Chat</a>
                <a href="#" onclick="openModelCriteria()" class="hover:text-pink-600 transition-colors">Kriteria Model</a>
                <a href="#" onclick="openFabricTypes()" class="hover:text-pink-600 transition-colors">Jenis Kain</a>
            </div>

            <div class="flex gap-4">
                <button onclick="openLogin()" 
                        class="px-6 py-2.5 border border-pink-300 rounded-3xl text-pink-600 hover:bg-pink-50 transition">Masuk</button>
                <button onclick="openRegister()" 
                        class="px-6 py-2.5 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl hover:scale-105 transition">Daftar Gratis</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section dengan Slideshow -->
    <section class="hero flex items-center text-white">
        <!-- Slideshow -->
        <div class="slideshow" id="slideshow">
            <div class="slide active" style="background-image: url('https://picsum.photos/id/1015/2000/1200')"></div> <!-- Pegunungan -->
            <div class="slide" style="background-image: url('https://picsum.photos/id/1016/2000/1200')"></div>     <!-- Pantai -->
            <div class="slide" style="background-image: url('https://picsum.photos/id/133/2000/1200')"></div>    <!-- Taman Bunga -->
            <div class="slide" style="background-image: url('https://picsum.photos/id/201/2000/1200')"></div>    <!-- Kota Malam -->
        </div>

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Konten Utama -->
        <div class="content max-w-5xl mx-auto px-6 text-center">
            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full mb-6 text-sm">
                🌸 Koleksi Terbaru 2026
            </div>
            
            <h1 class="text-5xl md:text-7xl font-bold logo-font leading-none mb-6">
                Wujudkan<br>Impian Baju Mu
            </h1>
            
            <p class="text-lg md:text-xl max-w-2xl mx-auto mb-10">
                Desain baju custom dengan AI canggih.<br>
                Dari baju hiking di pegunungan hingga dress pantai yang memukau.
            </p>

            <button onclick="openAIDesign()" 
                    class="px-10 py-5 bg-white text-pink-600 font-semibold rounded-3xl text-lg shadow-2xl hover:scale-105 transition flex items-center gap-3 mx-auto">
                <i class="fas fa-magic"></i>
                Mulai Desain dengan AI
            </button>
        </div>

        <!-- Slide Indicators -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex gap-3 z-20">
            <div onclick="goToSlide(0)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer active"></div>
            <div onclick="goToSlide(1)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
            <div onclick="goToSlide(2)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
            <div onclick="goToSlide(3)" class="slide-dot w-3 h-3 rounded-full bg-white/70 cursor-pointer"></div>
        </div>
    </section>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div id="modalContent" class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden shadow-2xl"></div>
    </div>

    <script>
        // === Slideshow Logic ===
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.slide-dot');

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        function nextSlide() {
            let next = (currentSlide + 1) % slides.length;
            showSlide(next);
        }

        function goToSlide(index) {
            showSlide(index);
        }

        // Auto slide setiap 5.5 detik
        setInterval(nextSlide, 5500);

        // === Modal Functions ===
        function showModal(title, htmlContent) {
            const modalHTML = `
                <div class="p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-semibold text-pink-600">${title}</h2>
                        <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
                    </div>
                    <div class="text-gray-600">${htmlContent}</div>
                </div>
                <div class="border-t p-4 flex justify-end bg-gray-50">
                    <button onclick="closeModal()" class="px-8 py-3 bg-pink-600 text-white rounded-3xl hover:bg-pink-700 transition">Tutup</button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = modalHTML;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function openAIDesign() {
            showModal("AI Design Studio", `
                <textarea id="prompt" rows="5" class="w-full p-4 border border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none" 
                    placeholder="Contoh: baju renang one-piece motif bunga sakura dengan warna pastel..."></textarea>
                <button onclick="generateAI()" class="mt-6 w-full py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-3xl font-medium text-lg hover:brightness-110 transition">
                    Generate Desain
                </button>
            `);
        }

        function generateAI() {
            closeModal();
            setTimeout(() => {
                showModal("Hasil AI Design", `
                    <div class="text-center py-10">
                        <div class="text-7xl mb-6">👗</div>
                        <p class="text-xl font-medium text-pink-600">Desain berhasil dibuat!</p>
                        <p class="text-gray-500 mt-3">Fitur preview gambar sedang dalam pengembangan</p>
                    </div>
                `);
            }, 500);
        }

        function openLiveChat() { showModal("Live Chat", "<p class='text-center py-12'>💬 Fitur ini sedang dalam pengembangan</p>"); }
        function openModelCriteria() { showModal("Kriteria Model", "<p class='py-8 text-center'>Ukuran tubuh, warna kulit, pose, dan preferensi model akan segera tersedia.</p>"); }
        function openFabricTypes() { showModal("Jenis Kain Premium", "<p class='py-8 text-center'>Satin • Cotton • Linen • Chiffon • Silk • Denim • dan lainnya</p>"); }
        function openLogin() { showModal("Masuk", "<p class='py-12 text-center text-lg'>Fitur login sedang dikembangkan</p>"); }
        function openRegister() { showModal("Daftar Gratis", "<p class='py-12 text-center'>Selamat datang di <span class='font-semibold text-pink-600'>MY Dreams</span>! 🌸</p>"); }

        // Inisialisasi
        window.onload = () => {
            console.log("%c🌸 MY Dreams siap mewujudkan impian bajumu!", "color:#db2777; font-size:15px");
        };
    </script>
</body>
</html>
